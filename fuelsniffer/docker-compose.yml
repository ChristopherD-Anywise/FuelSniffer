services:
  timescaledb:
    image: timescale/timescaledb:2.24.0-pg17
    stop_grace_period: 30s
    entrypoint:
      - bash
      - -c
      - |
        PGDATA="/var/lib/postgresql/data"
        BACKUP_DIR="/backups"
        LATEST_BACKUP="$${BACKUP_DIR}/latest.sql.gz"
        NEEDS_RESTORE="false"
        if [ -f "$$PGDATA/PG_VERSION" ]; then
          echo "[recovery] Existing data directory found — testing PostgreSQL startup..."
          if gosu postgres pg_ctl -D "$$PGDATA" -o "-c shared_preload_libraries=timescaledb" -l /tmp/pg_startup_test.log start -w -t 10 2>/dev/null; then
            echo "[recovery] PostgreSQL started normally — no recovery needed"
            gosu postgres pg_ctl -D "$$PGDATA" stop -m fast 2>/dev/null || true
          else
            echo "[recovery] *** PostgreSQL FAILED to start — likely WAL corruption ***"
            gosu postgres pg_ctl -D "$$PGDATA" stop -m fast 2>/dev/null || true
            if [ -f /tmp/pg_startup_test.log ]; then
              echo "[recovery] Startup log:"
              tail -20 /tmp/pg_startup_test.log
            fi
            if [ -f "$$LATEST_BACKUP" ]; then
              BACKUP_REAL=$$(readlink -f "$$LATEST_BACKUP")
              echo "[recovery] Found backup: $$BACKUP_REAL ($$(du -h "$$BACKUP_REAL" | cut -f1))"
              echo "[recovery] Wiping corrupt data directory..."
              find "$${PGDATA:?}" -mindepth 1 -delete
              # Save path for post-init restore
              echo "$$BACKUP_REAL" > /tmp/restore_from_backup
              NEEDS_RESTORE="true"
              echo "[recovery] === RECOVERY MODE === Will restore after fresh init"
            else
              echo "[recovery] *** NO BACKUP FOUND — wiping and starting fresh ***"
              find "$${PGDATA:?}" -mindepth 1 -delete
              echo "[recovery] The scraper will repopulate current prices on next cycle"
            fi
          fi
        else
          echo "[recovery] No existing data directory — first run, normal initialization"
        fi
        # If restore needed, start a background process that waits for DB to be ready
        # then pipes the filtered backup SQL into psql
        if [ "$$NEEDS_RESTORE" = "true" ]; then
          (
            echo "[recovery] Waiting for fresh database to be ready..."
            until pg_isready -U fuelsniffer -d fuelsniffer 2>/dev/null; do sleep 1; done
            sleep 2  # extra settle time
            BACKUP_REAL=$$(cat /tmp/restore_from_backup)
            echo "[recovery] Restoring from backup: $$BACKUP_REAL"
            # Backup contains plain CREATE TABLE + INSERT for user tables only.
            # Restore into fresh DB, then recreate TimescaleDB objects.
            echo "[recovery] Restoring tables and data..."
            gunzip -c "$$BACKUP_REAL" \
              | psql -U fuelsniffer -d fuelsniffer -v ON_ERROR_STOP=0 2>&1 \
              | tail -3
            echo "[recovery] Converting to hypertable and creating aggregates..."
            psql -U fuelsniffer -d fuelsniffer <<'EOSQL'
            SELECT create_hypertable('price_readings', 'recorded_at', migrate_data => true);
        EOSQL
            psql -U fuelsniffer -d fuelsniffer -c "
              CREATE MATERIALIZED VIEW hourly_prices WITH (timescaledb.continuous) AS
              SELECT station_id, fuel_type_id, time_bucket('1 hour', recorded_at) AS bucket,
                AVG(price_cents)::NUMERIC(6,1) AS avg_price_cents, MIN(price_cents) AS min_price_cents,
                MAX(price_cents) AS max_price_cents
              FROM price_readings GROUP BY station_id, fuel_type_id, bucket;"
            psql -U fuelsniffer -d fuelsniffer -c "
              CREATE MATERIALIZED VIEW daily_prices WITH (timescaledb.continuous) AS
              SELECT station_id, fuel_type_id, time_bucket('1 day', bucket) AS day_bucket,
                AVG(avg_price_cents)::NUMERIC(6,1) AS avg_price_cents, MIN(min_price_cents) AS min_price_cents,
                MAX(max_price_cents) AS max_price_cents
              FROM hourly_prices GROUP BY station_id, fuel_type_id, day_bucket;"
            echo "[recovery] === RESTORE COMPLETE ==="
            echo "[recovery] Verifying..."
            STATIONS=$$(psql -U fuelsniffer -d fuelsniffer -t -c "SELECT COUNT(*) FROM stations;" 2>/dev/null | tr -d ' ')
            PRICES=$$(psql -U fuelsniffer -d fuelsniffer -t -c "SELECT COUNT(*) FROM price_readings;" 2>/dev/null | tr -d ' ')
            echo "[recovery] Restored: $$STATIONS stations, $$PRICES price readings"
          ) &
        fi
        exec docker-entrypoint.sh postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelsniffer -d fuelsniffer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fuelsniffer
      POSTGRES_USER: fuelsniffer
    ports:
      - "5432:5432"
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped

  db-backup:
    image: timescale/timescaledb:2.24.0-pg17
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PGHOST: timescaledb
      PGUSER: fuelsniffer
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: fuelsniffer
    volumes:
      - ./backups:/backups
    entrypoint:
      - bash
      - -c
      - |
        set -o pipefail
        BACKUP_DIR="/backups"
        RETENTION_COUNT=48
        echo "[backup] Backup sidecar started. Writing to $${BACKUP_DIR}, keeping last $${RETENTION_COUNT} backups."
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="$${BACKUP_DIR}/fuelsniffer_$${TIMESTAMP}.sql.gz"
          TEMP_FILE="$${BACKUP_DIR}/.fuelsniffer_$${TIMESTAMP}.sql.gz.tmp"
          echo "[backup] Starting backup at $$(date)"
          if pg_dump --no-owner --data-only --inserts --table=public.stations --table=public.scrape_health --table=public.invite_codes --table=public.sessions --table='_timescaledb_internal._hyper_*' | gzip > "$${TEMP_FILE}"; then
            mv "$${TEMP_FILE}" "$${BACKUP_FILE}"
            echo "[backup] OK — $$(du -h "$${BACKUP_FILE}" | cut -f1) written to $${BACKUP_FILE}"
            ln -sf "$$(basename "$${BACKUP_FILE}")" "$${BACKUP_DIR}/latest.sql.gz"
          else
            echo "[backup] FAILED — pg_dump returned non-zero"
            rm -f "$${TEMP_FILE}"
          fi
          ls -t "$${BACKUP_DIR}"/fuelsniffer_*.sql.gz 2>/dev/null | tail -n +$$((RETENTION_COUNT + 1)) | xargs -r rm -f
          echo "[backup] Next backup in 1 hour"
          sleep 3600
        done
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://fuelsniffer:${DB_PASSWORD}@timescaledb:5432/fuelsniffer
      QLD_API_TOKEN: ${QLD_API_TOKEN}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL}
      TZ: Australia/Brisbane
      NODE_ENV: production
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:3000
    # For a persistent named tunnel (recommended for production):
    # 1. Create tunnel: cloudflared tunnel create fuelsniffer
    # 2. Set CLOUDFLARE_TUNNEL_TOKEN in .env
    # 3. Replace command with: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
