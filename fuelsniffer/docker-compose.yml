services:
  postgres:
    container_name: fillip-postgres
    image: postgis/postgis:17-3.4-alpine
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelsniffer -d fuelsniffer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fuelsniffer
      POSTGRES_USER: fuelsniffer
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups:/backups
    restart: always

  db-backup:
    container_name: fillip-db-backup
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_started
    environment:
      PGHOST: postgres
      PGUSER: fuelsniffer
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: fuelsniffer
    volumes:
      - ./backups:/backups
    entrypoint:
      - sh
      - -c
      - |
        set -o pipefail
        BACKUP_DIR="/backups"
        RETENTION_COUNT=48
        echo "[backup] Backup sidecar started. Writing to $${BACKUP_DIR}, keeping last $${RETENTION_COUNT} backups."
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="$${BACKUP_DIR}/fuelsniffer_$${TIMESTAMP}.sql.gz"
          TEMP_FILE="$${BACKUP_DIR}/.fuelsniffer_$${TIMESTAMP}.sql.gz.tmp"
          echo "[backup] Starting backup at $$(date)"
          if pg_dump --clean --if-exists --no-owner | gzip > "$${TEMP_FILE}"; then
            mv "$${TEMP_FILE}" "$${BACKUP_FILE}"
            echo "[backup] OK — $$(du -h "$${BACKUP_FILE}" | cut -f1) written to $${BACKUP_FILE}"
            ln -sf "$$(basename "$${BACKUP_FILE}")" "$${BACKUP_DIR}/latest.sql.gz"
          else
            echo "[backup] FAILED — pg_dump returned non-zero"
            rm -f "$${TEMP_FILE}"
          fi
          ls -t "$${BACKUP_DIR}"/fuelsniffer_*.sql.gz 2>/dev/null | tail -n +$$((RETENTION_COUNT + 1)) | xargs -r rm -f
          echo "[backup] Next backup in 1 hour"
          sleep 3600
        done
    restart: always

  app:
    container_name: fillip-app
    build: .
    environment:
      DATABASE_URL: postgresql://fuelsniffer:${DB_PASSWORD}@postgres:5432/fuelsniffer
      SESSION_SECRET: ${SESSION_SECRET}
      QLD_API_TOKEN: ${QLD_API_TOKEN}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      APP_NAME: ${APP_NAME:-Fillip}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:4000}
      APP_DEFAULT_THEME: ${APP_DEFAULT_THEME:-system}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Fillip}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@fillip.local}
      # Auth v2 (SP-2)
      MAGIC_LINK_TTL_MINUTES: ${MAGIC_LINK_TTL_MINUTES:-15}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY_P8: ${APPLE_PRIVATE_KEY_P8:-}
      TZ: Australia/Brisbane
      NODE_ENV: production
      # SP-8: Share card signing
      SHARE_SIGNING_SECRET: ${SHARE_SIGNING_SECRET:-}
      # SP-8: Social bot — all networks OFF by default (safe-by-default)
      # Set to 'true' to enable each network after provisioning credentials
      FILLIP_BOT_X_ENABLED: ${FILLIP_BOT_X_ENABLED:-false}
      FILLIP_BOT_BLUESKY_ENABLED: ${FILLIP_BOT_BLUESKY_ENABLED:-false}
      FILLIP_BOT_MASTODON_ENABLED: ${FILLIP_BOT_MASTODON_ENABLED:-false}
      # Set SOCIAL_BOT_DISABLED=true to disable all networks regardless of per-network flags
      SOCIAL_BOT_DISABLED: ${SOCIAL_BOT_DISABLED:-false}
      # Set SOCIAL_DRY_RUN=false to actually post (default: true = log only)
      SOCIAL_DRY_RUN: ${SOCIAL_DRY_RUN:-true}
      # X (Twitter) credentials
      SOCIAL_X_OAUTH_CLIENT_ID: ${SOCIAL_X_OAUTH_CLIENT_ID:-}
      SOCIAL_X_OAUTH_CLIENT_SECRET: ${SOCIAL_X_OAUTH_CLIENT_SECRET:-}
      SOCIAL_X_ACCESS_TOKEN: ${SOCIAL_X_ACCESS_TOKEN:-}
      SOCIAL_X_ACCESS_SECRET: ${SOCIAL_X_ACCESS_SECRET:-}
      # BlueSky credentials
      SOCIAL_BLUESKY_HANDLE: ${SOCIAL_BLUESKY_HANDLE:-}
      SOCIAL_BLUESKY_APP_PASSWORD: ${SOCIAL_BLUESKY_APP_PASSWORD:-}
      # Mastodon credentials
      SOCIAL_MASTODON_INSTANCE_URL: ${SOCIAL_MASTODON_INSTANCE_URL:-https://aus.social}
      SOCIAL_MASTODON_ACCESS_TOKEN: ${SOCIAL_MASTODON_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: always

  cloudflared:
    container_name: fillip-cloudflared
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate --url http://app:3000
    depends_on:
      - app
